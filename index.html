<!DOCTYPE html>
<html>
<head>
<title>Food Finder</title>
<link rel="stylesheet" href="style.css">
<script src="script.js"></script>
</head>

<body>

<header>

<h1>🍽 Food Finder</h1>
<p>Discover the best food near you</p>

<input type="text" id="search" placeholder="Search restaurant or food..." onkeyup="searchFood()">

</header>


<section class="restaurants" id="restaurantList">

<div class="card">
<img src="images/pizza.jpg">
<h2>Pizza Hub</h2>
<p>Italian, Fast Food</p>
</div>

<div class="card">
<img src="images/burger.jpg">
<h2>Burger Town</h2>
<p>Burgers, Snacks</p>
</div>

<div class="card">
<img src="images/misal.jpg">
<h2>Misal House</h2>
<p>Maharashtrian Food</p>
</div>

<div class="card">
<img src="images/biryani.jpg">
<h2>Biryani Palace</h2>
<p>Hyderabadi Biryani</p>
</div>

</section>

</body>
</html>
